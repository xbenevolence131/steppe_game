<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Steppe Terrain Generator</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="app-header">
      <h1>Steppe Terrain Generator</h1>
    </header>

    <main class="app-shell">
      <section class="parameter-panel" aria-label="Scenario generation parameters">
        <div class="field-grid">
          <label>
            <span>Map width</span>
            <input id="map-width" type="number" min="1" max="120" value="120">
          </label>
          <label>
            <span>Map height</span>
            <input id="map-height" type="number" min="1" max="80" value="80">
          </label>
        </div>

        <div class="panel-actions">
          <button id="generate-button" type="button">Generate</button>
          <button id="save-button" type="button">Save Terrain</button>
          <button id="load-button" type="button">Load Terrain</button>
        </div>
      </section>

      <section class="map-section" aria-label="Generated terrain map">
        <div class="map-toolbar" aria-label="Map view controls">
          <button id="zoom-out-button" class="secondary icon-button" type="button" aria-label="Zoom out" title="Zoom out">−</button>
          <button id="zoom-in-button" class="secondary icon-button" type="button" aria-label="Zoom in" title="Zoom in">+</button>
          <button id="fit-button" class="secondary fit-button" type="button" aria-label="Fit map" title="Fit map">Fit</button>
        </div>
        <div id="map-panel" class="map-panel" tabindex="0">
          <canvas id="map-canvas"></canvas>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
